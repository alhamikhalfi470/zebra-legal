<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=legal/">
  <title>Zebraa Legal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f2;
      --text: #171715;
      --link: #0f5f7a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --text: #f1f0e8;
        --link: #7ec7df;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 620px;
      padding: 32px 20px;
      text-align: center;
    }
    a {
      color: var(--link);
    }
  </style>
</head>
<body>
  <main>
    <h1>Zebraa Legal</h1>
    <p><a href="legal/">Open Zebraa legal documents</a></p>
  </main>
</body>
</html>
