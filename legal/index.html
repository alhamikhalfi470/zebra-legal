<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zebra Legal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f2;
      --text: #171715;
      --muted: #66645d;
      --link: #0f5f7a;
      --border: #d9d7cd;
      --panel: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141412;
        --text: #f1f0e8;
        --muted: #b6b2a8;
        --link: #7ec7df;
        --border: #3b3932;
        --panel: #1e1e1a;
      }
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
      margin: 0 0 16px;
      letter-spacing: 0;
    }
    p {
      color: var(--muted);
      margin: 0 0 24px;
    }
    nav {
      display: grid;
      gap: 12px;
      margin-top: 32px;
    }
    a {
      color: var(--link);
      text-decoration: none;
    }
    .doc-link {
      display: block;
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      font-weight: 650;
    }
    .doc-link span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 400;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Zebra Legal</h1>
    <p>Legal documents for the Zebra iOS app.</p>
    <nav aria-label="Legal documents">
      <a class="doc-link" href="privacy-policy.html">Privacy Policy<span>How Zebra handles local data, Are.na requests, purchases, and support emails.</span></a>
      <a class="doc-link" href="terms-and-conditions.html">Terms and Conditions<span>Rules for using Zebra, Zebra Pro, subscriptions, third-party content, and Apple terms.</span></a>
    </nav>
  </main>
</body>
</html>
